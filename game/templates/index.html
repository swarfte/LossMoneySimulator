<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盲盘炒股挑战</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 稳定版图表CDN -->
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; height: 100vh; }
    </style>
</head>
<body class="bg-slate-900 text-white">
    <!-- 左K线 + 右操作 一屏布局 -->
    <div class="flex h-screen w-full">
        <!-- 左侧：K线区域 -->
        <div class="w-[65%] p-4 flex flex-col gap-4">
            <!-- 顶部状态栏 -->
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold">盲盘炒股挑战</h1>
                    <p class="text-slate-400">标的行业: {{ industry }}</p>
                </div>
                <div class="flex gap-8">
                    <div class="text-right">
                        <p class="text-slate-400 text-sm">可用现金</p>
                        <p id="cash" class="text-2xl font-bold text-green-400">${{ initial_cash }}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-slate-400 text-sm">净资产</p>
                        <p id="net-value" class="text-2xl font-bold text-white">${{ initial_cash }}</p>
                    </div>
                </div>
            </div>

            <!-- K线价格信息 -->
            <div class="flex justify-between items-end px-2">
                <div>
                    <h2 id="current-price" class="text-3xl font-bold text-white">$0.00</h2>
                    <p id="current-date" class="text-slate-400">-</p>
                </div>
                <p id="progress" class="text-slate-500">进度: 0/0</p>
            </div>

            <!-- 蜡烛图容器 -->
            <div id="candle-chart" class="flex-1 w-full bg-slate-800 rounded-xl border border-slate-700 overflow-hidden"></div>
        </div>

        <!-- 右侧：操作&持仓面板 -->
        <div class="w-[35%] p-4 flex flex-col gap-4 overflow-y-auto bg-slate-900 border-l border-slate-800">
            <!-- 交易操作面板 -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-xl font-bold mb-6">交易操作</h3>
                
                <div class="mb-6">
                    <label class="block text-sm text-slate-400 mb-2">交易股数</label>
                    <input 
                        type="number" 
                        id="shares-input" 
                        value="10" 
                        min="1" 
                        class="w-full bg-slate-700 border border-slate-600 rounded-lg p-4 text-white text-lg focus:ring-2 focus:ring-blue-500 outline-none"
                    >
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <button onclick="buyLong()" class="py-4 bg-green-600 hover:bg-green-500 text-white font-bold rounded-lg transition-all text-lg">
                        买入做多
                    </button>
                    <button onclick="sellLong()" class="py-4 bg-yellow-600 hover:bg-yellow-500 text-white font-bold rounded-lg transition-all text-lg">
                        卖出多头
                    </button>
                    <button onclick="openShort()" class="py-4 bg-red-600 hover:bg-red-500 text-white font-bold rounded-lg transition-all text-lg">
                        卖空开仓
                    </button>
                    <button onclick="coverShort()" class="py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition-all text-lg">
                        回补空头
                    </button>
                </div>

                <!-- 原下一个交易日按钮 -->
                <button 
                    id="next-day-btn"
                    onclick="nextDay()" 
                    class="w-full py-5 bg-slate-600 hover:bg-slate-500 disabled:bg-slate-800 disabled:cursor-not-allowed text-white font-bold rounded-xl transition-all text-xl"
                >
                    下一个交易日 ▶
                </button>

                <!-- 【新增】快进按钮组 -->
                <div class="grid grid-cols-2 gap-4 pt-2 mt-4">
                    <button 
                        id="fast-5-btn"
                        onclick="fastForward(5)" 
                        class="py-3 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-lg transition-all"
                    >
                        快进5天 (一周)
                    </button>
                    <button 
                        id="fast-20-btn"
                        onclick="fastForward(20)" 
                        class="py-3 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-lg transition-all"
                    >
                        快进20天 (一个月)
                    </button>
                </div>

                
            </div>

            <!-- 持仓面板 -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-xl font-bold mb-6">当前持仓</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-green-900/20 p-5 rounded-lg border border-green-900/50">
                        <div class="text-sm text-green-400 mb-2">多头持仓 (Long)</div>
                        <div id="long-shares" class="text-4xl font-bold text-white">0</div>
                        <div id="long-value" class="text-sm text-slate-400 mt-2">$0.00</div>
                    </div>
                    <div class="bg-red-900/20 p-5 rounded-lg border border-red-900/50">
                        <div class="text-sm text-red-400 mb-2">空头持仓 (Short)</div>
                        <div id="short-shares" class="text-4xl font-bold text-white">0</div>
                        <div id="short-liability" class="text-sm text-slate-400 mt-2">负债: $0.00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 结束弹窗 -->
    <div id="result-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div class="bg-slate-800 p-8 rounded-3xl max-w-md w-full border border-slate-600 text-center">
            <h2 class="text-3xl font-bold mb-2">挑战结束</h2>
            <p class="text-2xl text-yellow-400 mb-1">这只股票是：{{ symbol }}</p>
            <p class="text-slate-500 mb-8">{{ industry }}</p>
            
            <div id="final-return" class="text-6xl font-black mb-2 text-white">0.00%</div>
            <div id="final-value" class="text-2xl text-slate-300 mb-8">$0.00</div>

            <button onclick="location.reload()" class="w-full py-4 bg-white text-slate-900 font-bold rounded-xl hover:bg-slate-200 transition-all">
                再来一局 (刷新换股)
            </button>
        </div>
    </div>

    <script>
        // Django传入的真实K线数据
        const allCandles = {{ candles_json|safe }};

        // 数据校验，无真实数据直接提示
        if (!allCandles || allCandles.length < 120) {
            document.body.innerHTML = `
                <div class="min-h-screen bg-slate-900 flex items-center justify-center text-white">
                    <div class="text-center">
                        <h1 class="text-3xl font-bold text-red-500 mb-4">真实数据获取失败</h1>
                        <p class="text-slate-300 mb-6">未获取到有效的股票行情，请刷新页面重试</p>
                        <button onclick="location.reload()" class="bg-blue-600 px-6 py-3 rounded-lg font-bold">刷新重试</button>
                    </div>
                </div>
            `;
        }

        // 全局状态
        let state = {
            currentDay: 90, // 初始显示前90天真实数据
            cash: {{ initial_cash }},
            longShares: 0,
            shortShares: 0,
            chart: null,
            candleSeries: null
        };

        // 格式化金额
        const fmtMoney = (num) => '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // 初始化蜡烛图
        function initChart() {
            const chartContainer = document.getElementById('candle-chart');
            
            if (!window.LightweightCharts) {
                alert("图表库加载失败，请刷新页面");
                return;
            }

            // 创建图表实例
            state.chart = window.LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth,
                height: chartContainer.clientHeight,
                layout: {
                    background: { type: 'solid', color: '#1e293b' },
                    textColor: '#94a3b8',
                },
                grid: {
                    vertLines: { color: '#334155' },
                    horzLines: { color: '#334155' },
                },
                crosshair: {
                    mode: window.LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#334155',
                },
                timeScale: {
                    borderColor: '#334155',
                    timeVisible: true,
                    secondsVisible: false,
                },
            });

            // 创建蜡烛图系列
            state.candleSeries = state.chart.addCandlestickSeries({
                upColor: '#22c55e',
                downColor: '#ef4444',
                borderDownColor: '#ef4444',
                borderUpColor: '#22c55e',
                wickDownColor: '#ef4444',
                wickUpColor: '#22c55e',
            });

            // 窗口大小自适应
            window.addEventListener('resize', () => {
                state.chart.applyOptions({ 
                    width: chartContainer.clientWidth,
                    height: chartContainer.clientHeight
                });
            });

            updateChartData();
        }

        // 更新图表数据
        function updateChartData() {
            if (!state.candleSeries) return;
            const visibleCandles = allCandles.slice(0, state.currentDay + 1);
            state.candleSeries.setData(visibleCandles);
            state.chart.timeScale().fitContent();
            // 快进后更新按钮禁用状态
            updateButtonStatus();
        }

        // 更新按钮禁用状态（到最后一天禁用所有按钮）
        function updateButtonStatus() {
            const isEnded = state.currentDay >= allCandles.length - 1;
            document.getElementById('next-day-btn').disabled = isEnded;
            document.getElementById('fast-5-btn').disabled = isEnded;
            document.getElementById('fast-20-btn').disabled = isEnded;
        }

        // 获取当前收盘价
        function getCurrentPrice() {
            return allCandles[state.currentDay].close;
        }

        // 获取输入股数
        function getInputShares() {
            return Math.max(1, parseInt(document.getElementById('shares-input').value) || 10);
        }

        // 【新增】快进核心函数
        function fastForward(days) {
            const maxDay = allCandles.length - 1;
            // 计算目标天数，不超过最大值
            const targetDay = Math.min(state.currentDay + days, maxDay);
            
            // 更新当前天数
            state.currentDay = targetDay;
            
            // 更新图表和UI
            updateChartData();
            updateUI();

            // 如果到了最后一天，触发结束弹窗
            if (state.currentDay >= maxDay) {
                showResult();
            }
        }

        // 交易逻辑
        function buyLong() {
            const shares = getInputShares();
            const price = getCurrentPrice();
            const cost = shares * price;
            if (state.cash >= cost) {
                state.cash -= cost;
                state.longShares += shares;
                updateUI();
            } else {
                alert('现金不足！');
            }
        }

        function sellLong() {
            const shares = getInputShares();
            const price = getCurrentPrice();
            if (state.longShares >= shares) {
                state.cash += shares * price;
                state.longShares -= shares;
                updateUI();
            } else {
                alert('多头持仓不足！');
            }
        }

        function openShort() {
            const shares = getInputShares();
            const price = getCurrentPrice();
            const margin = shares * price;
            if (state.cash >= margin) {
                state.cash += margin;
                state.shortShares += shares;
                updateUI();
            } else {
                alert('保证金不足！');
            }
        }

        function coverShort() {
            const shares = getInputShares();
            const price = getCurrentPrice();
            const cost = shares * price;
            if (state.shortShares >= shares) {
                state.cash -= cost;
                state.shortShares -= shares;
                updateUI();
            } else {
                alert('空头持仓不足！');
            }
        }

        // 下一个交易日
        function nextDay() {
            if (state.currentDay < allCandles.length - 1) {
                state.currentDay++;
                updateChartData();
                updateUI();
            } else {
                showResult();
            }
        }

        // 更新UI
        function updateUI() {
            const currentCandle = allCandles[state.currentDay];
            const currentPrice = currentCandle.close;

            // 基础信息
            document.getElementById('current-price').textContent = fmtMoney(currentPrice);
            document.getElementById('current-date').textContent = currentCandle.date_str;
            document.getElementById('progress').textContent = `进度: ${state.currentDay - 90} / ${allCandles.length - 90}`;

            // 资产计算
            const longValue = state.longShares * currentPrice;
            const shortLiability = state.shortShares * currentPrice;
            const netValue = state.cash + longValue - shortLiability;

            // 更新显示
            document.getElementById('cash').textContent = fmtMoney(state.cash);
            document.getElementById('net-value').textContent = fmtMoney(netValue);
            document.getElementById('long-shares').textContent = state.longShares;
            document.getElementById('long-value').textContent = fmtMoney(longValue);
            document.getElementById('short-shares').textContent = state.shortShares;
            document.getElementById('short-liability').textContent = `负债: ${fmtMoney(shortLiability)}`;
        }

        // 最终结果
        function showResult() {
            const currentPrice = getCurrentPrice();
            const finalValue = state.cash + (state.longShares * currentPrice) - (state.shortShares * currentPrice);
            const returnRate = ((finalValue - 20000) / 20000) * 100;

            document.getElementById('final-value').textContent = fmtMoney(finalValue);
            const returnEl = document.getElementById('final-return');
            returnEl.textContent = (returnRate >= 0 ? '+' : '') + returnRate.toFixed(2) + '%';
            returnEl.className = `text-6xl font-black mb-2 ${returnRate >= 0 ? 'text-green-400' : 'text-red-400'}`;

            document.getElementById('result-modal').classList.remove('hidden');
        }

        // 页面加载完成初始化
        window.addEventListener('load', () => {
            initChart();
            updateUI();
            updateButtonStatus();
        });
    </script>
</body>
</html>
